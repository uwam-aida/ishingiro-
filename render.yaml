services:
  - type: web
    name: ishingiro-shop-api
    env: php
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan optimize
    startCommand: |
      php artisan migrate --force
      php artisan db:seed --class=RoleSeeder --force
      php artisan app:seed-system-users
      php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        fromService:
          name: ishingiro-shop-api
          type: web
          property: host
      - key: APP_KEY
        generateValue: true
      - key: CACHE_DRIVER
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: SESSION_DRIVER
        value: file
      - key: REDIS_HOST
        fromService:
          name: ishingiro-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: ishingiro-redis
          type: redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          name: ishingiro-redis
          type: redis
          property: password
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: ishingiro-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ishingiro-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: ishingiro-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ishingiro-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ishingiro-db
          property: password
      - key: ONESIGNAL_APP_ID
        sync: false
      - key: ONESIGNAL_API_KEY
        sync: false

  - type: redis
    name: ishingiro-redis
    ipAllowList: []

  - type: worker
    name: ishingiro-queue-worker
    env: php
    buildCommand: composer install --no-dev --optimize-autoloader
    startCommand: php artisan queue:work redis --sleep=3 --tries=3
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: CACHE_DRIVER
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: REDIS_HOST
        fromService:
          name: ishingiro-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: ishingiro-redis
          type: redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          name: ishingiro-redis
          type: redis
          property: password
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: ishingiro-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ishingiro-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: ishingiro-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ishingiro-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ishingiro-db
          property: password
      - key: ONESIGNAL_APP_ID
        sync: false
      - key: ONESIGNAL_API_KEY
        sync: false

databases:
  - name: ishingiro-db
    databaseName: ishingiro_shop
    user: ishingiro_user
    plan: free